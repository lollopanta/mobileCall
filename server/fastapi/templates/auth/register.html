<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - MobileCall</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>
    <div class="box glass">
        <h1>Create Account</h1>  
        <form id="registerForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" class="inputField" id="username" name="username" placeholder="Choose a username" required>
            </div>

            <div class="form-group">
                <label for="user_password">Password</label>
                <input type="password" class="inputField" id="user_password" name="user_password" placeholder="Min. 8 characters" required>
            </div>

            <div class="form-group">
                <label for="confirm_user_password">Confirm Password</label>
                <input type="password" class="inputField" id="confirm_user_password" name="confirm_user_password" placeholder="Repeat password" required>
            </div>

            <button type="submit" class="submitButton" id="submitButton">Register</button>
            
            <p id="suggestLogin" style="margin-top: 20px;">
                Already have an account? <a href="/login">Sign in</a>
            </p>
        </form>
    </div>

    <script src="{{ url_for('static', path='register.js') }}"></script>
</body>
</html>
