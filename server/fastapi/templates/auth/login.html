<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - MobileCall</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>
    <div class="box glass">
        <h1>Sign In</h1>  
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" class="inputField" id="username" name="username" placeholder="Enter your username" required>
            </div>
            
            <div class="form-group">
                <label for="user_password">Password</label>
                <input type="password" class="inputField" id="user_password" name="user_password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="submitButton" id="submitButton">Login</button>
            
            <p id="suggestRegistration">
                Don't have an account? <a href="/register">Create one</a>
            </p>
        </form>
    </div>
    <script src="{{ url_for('static', path='login.js') }}"></script>
</body>
</html>
