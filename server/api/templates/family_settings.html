<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Settings - MobileCall</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>
    <div class="box glass" style="max-width: 600px;">
        <div style="text-align: left; margin-bottom: 30px;">
            <h1 style="font-size: 1.5rem; background: none; -webkit-text-fill-color: initial; color: white;">Family Settings</h1>
            <p>Manage your group members and invitations.</p>
        </div>

        <div style="background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 20px; padding: 24px; margin-bottom: 24px;">
            <h3 style="display: flex; align-items: center; gap: 8px; font-size: 1rem; margin-bottom: 16px;">
                Invite Members
            </h3>
            <form id="inviteForm" style="display: flex; gap: 10px;">
                <input type="text" id="inviteUsername" class="inputField" placeholder="Search by username..." required style="flex: 1;">
                <button type="submit" class="submitButton" style="width: auto; margin-top: 0; padding: 0 24px;">Send Invite</button>
            </form>
            <p id="inviteMessage" style="font-size: 0.8rem; margin-top: 8px; display: none;"></p>
        </div>

        <div style="text-align: left;">
            <h3 style="font-size: 1rem; margin-bottom: 16px; color: var(--text-muted); padding-left: 8px;">Current Members</h3>
            <div id="membersList">
                <p style="padding: 20px; color: var(--text-muted);">Loading members...</p>
            </div>
        </div>

        <div style="margin-top: 40px; display: flex; gap: 12px;">
            <a href="/user/{{ logged_in_user }}" class="btn-outline" style="flex: 1;">Back to Profile</a>
            <a href="/notifications" class="btn-outline" style="flex: 1;">View Inbox</a>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('auth_token');

        async function loadMembers() {
            const listDiv = document.getElementById('membersList');
            try {
                const res = await fetch('/api/family/members', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.status === 'successful') {
                    listDiv.innerHTML = data.members.map(m => `
                        <div class="list-item">
                            <div class="member-avatar" style="width: 40px; height: 40px; font-size: 1rem; margin: 0;">
                                ${m.username[0].toUpperCase()}
                            </div>
                            <div style="flex: 1;">
                                <div style="font-weight: 600;">${m.username}</div>
                                <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: capitalize;">${m.role}</div>
                            </div>
                            ${m.role === 'admin' ? '<span class="badge badge-success">Admin</span>' : ''}
                        </div>
                    `).join('');
                }
            } catch (e) { console.error(e); }
        }

        document.getElementById('inviteForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('inviteUsername').value;
            const msg = document.getElementById('inviteMessage');
            
            msg.style.display = 'block';
            msg.style.color = 'var(--text-muted)';
            msg.innerText = 'Sending...';

            const res = await fetch('/api/family/invite', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ username })
            });
            const result = await res.json();
            
            msg.innerText = result.message;
            msg.style.color = result.status === 'successful' ? 'var(--success)' : 'var(--danger)';
            if (result.status === 'successful') {
                document.getElementById('inviteUsername').value = '';
                setTimeout(() => { msg.style.display = 'none'; }, 3000);
            }
        };

        if (token) loadMembers();
    </script>
</body>
</html>
