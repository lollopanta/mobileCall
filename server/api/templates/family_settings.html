<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Settings - MobileCall</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>
    <div class="box glass" style="max-width: 600px;">
        <div style="text-align: left; margin-bottom: 30px;">
            <h1 style="font-size: 1.5rem; background: none; -webkit-text-fill-color: initial; color: white;">Family Settings</h1>
            <p>Manage your group members and invitations.</p>
        </div>

        <div
            id="fallSetupNotice"
            class="setup-notice"
            style="display: none; margin-bottom: 24px;"
            data-is-admin="{{ 'true' if is_family_admin else 'false' }}"
        ></div>

        <div style="background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 20px; padding: 24px; margin-bottom: 24px;">
            <h3 style="display: flex; align-items: center; gap: 8px; font-size: 1rem; margin-bottom: 16px;">
                Primary Grandparent
            </h3>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 16px;">Choose which grandparent device should originate emergency calls after a fall.</p>
            <div id="primaryGrandparentList">
                <p style="padding: 12px 0; color: var(--text-muted);">Loading grandparents...</p>
            </div>
            <p id="primaryGrandparentMessage" style="font-size: 0.8rem; margin-top: 12px; display: none;"></p>
        </div>

        <div style="background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 20px; padding: 24px; margin-bottom: 24px;">
            <h3 style="display: flex; align-items: center; gap: 8px; font-size: 1rem; margin-bottom: 16px;">
                Ambient Mode Settings
            </h3>
            <form id="settingsForm" style="display: flex; flex-direction: column; gap: 15px;">
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <label style="font-size: 0.8rem; color: var(--text-muted); padding-left: 4px;">Google Photos Album URL</label>
                    <input type="text" id="albumUrl" class="inputField" placeholder="Paste shared album link here..." style="flex: 1; margin-top: 0;">
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <label style="font-size: 0.8rem; color: var(--text-muted); padding-left: 4px;">Idle Timeout (minutes)</label>
                    <div style="display: flex; gap: 10px;">
                        <button type="button" class="btn-timeout" onclick="setTimeoutValue(2)">2m</button>
                        <button type="button" class="btn-timeout" onclick="setTimeoutValue(5)">5m</button>
                        <button type="button" class="btn-timeout" onclick="setTimeoutValue(10)">10m</button>
                        <button type="button" class="btn-timeout" onclick="setTimeoutValue(15)">15m</button>
                        <input type="hidden" id="idleTimeout" value="5">
                    </div>
                </div>

                <button type="submit" class="submitButton" style="width: auto; margin-top: 10px; padding: 0 24px; align-self: flex-start;">Save Settings</button>
            </form>
            <p id="settingsMessage" style="font-size: 0.8rem; margin-top: 12px; display: none;"></p>
        </div>

        <div style="background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 20px; padding: 24px; margin-bottom: 24px;">
            <h3 style="display: flex; align-items: center; gap: 8px; font-size: 1rem; margin-bottom: 16px;">
                Invite Members
            </h3>
            <form id="inviteForm" style="display: flex; gap: 10px;">
                <input type="text" id="inviteUsername" class="inputField" placeholder="Search by username..." required style="flex: 1;">
                <button type="submit" class="submitButton" style="width: auto; margin-top: 0; padding: 0 24px;">Send Invite</button>
            </form>
            <p id="inviteMessage" style="font-size: 0.8rem; margin-top: 8px; display: none;"></p>
        </div>

        <div style="text-align: left;">
            <h3 style="font-size: 1rem; margin-bottom: 16px; color: var(--text-muted); padding-left: 8px;">Current Members</h3>
            <div id="membersList">
                <p style="padding: 20px; color: var(--text-muted);">Loading members...</p>
            </div>
        </div>

        <div style="margin-top: 40px; display: flex; gap: 12px;">
            <a href="/user/{{ logged_in_user }}" class="btn-outline" style="flex: 1;">Back to Profile</a>
            <a href="/notifications" class="btn-outline" style="flex: 1;">View Inbox</a>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('auth_token');
        const fallSetupNotice = document.getElementById('fallSetupNotice');
        const isFamilyAdmin = fallSetupNotice.dataset.isAdmin === 'true';

        function updateFallSetupNotice(settings, members = []) {
            const grandparents = members.filter(member => member.role === 'grandparent');
            const hasPrimary = Boolean(settings && settings.primary_grandparent_id);

            if (hasPrimary) {
                fallSetupNotice.style.display = 'none';
                fallSetupNotice.innerHTML = '';
                return;
            }

            let message = '';
            if (grandparents.length === 0) {
                message = isFamilyAdmin
                    ? 'Fall detection is paused for this family. Invite a grandparent device first, then choose it as the primary emergency source.'
                    : 'Fall detection is paused for this family until a grandparent joins.';
            } else {
                message = isFamilyAdmin
                    ? 'Fall detection is paused for this family. Choose a primary grandparent below to activate emergency fall calls on this local device.'
                    : 'Fall detection is paused until the family admin chooses a primary grandparent.';
            }

            fallSetupNotice.style.display = 'block';
            fallSetupNotice.innerHTML = `
                <div class="badge badge-pending" style="display: inline-flex; margin-bottom: 10px;">Setup Required</div>
                <div style="font-weight: 600; margin-bottom: 6px;">Local fall monitoring is not active yet.</div>
                <p style="color: var(--text-muted);">${message}</p>
            `;
        }

        function setTimeoutValue(val) {
            document.getElementById('idleTimeout').value = val;
            document.querySelectorAll('.btn-timeout').forEach(btn => {
                if (parseInt(btn.innerText) === val) {
                    btn.style.background = 'var(--purple)';
                    btn.style.borderColor = 'var(--purple-dark)';
                    btn.style.color = 'white';
                } else {
                    btn.style.background = 'rgba(255,255,255,0.05)';
                    btn.style.borderColor = 'var(--glass-border)';
                    btn.style.color = 'var(--text-muted)';
                }
            });
        }

        async function loadSettings() {
            try {
                const res = await fetch('/api/family/settings', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.status === 'successful' && data.settings) {
                    document.getElementById('albumUrl').value = data.settings.google_photos_album_url || '';
                    setTimeoutValue(data.settings.idle_timeout || 5);
                    updateFallSetupNotice(data.settings);
                }
            } catch (e) { console.error(e); }
        }

        document.getElementById('settingsForm').onsubmit = async (e) => {
            e.preventDefault();
            const albumUrl = document.getElementById('albumUrl').value;
            const idleTimeout = parseInt(document.getElementById('idleTimeout').value);
            const msg = document.getElementById('settingsMessage');

            msg.style.display = 'block';
            msg.innerText = 'Saving...';

            try {
                const res = await fetch('/api/family/settings', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ google_photos_album_url: albumUrl, idle_timeout: idleTimeout })
                });
                const data = await res.json();
                msg.innerText = data.message;
                msg.style.color = data.status === 'successful' ? 'var(--success)' : 'var(--danger)';
                setTimeout(() => { msg.style.display = 'none'; }, 3000);
            } catch (e) {
                msg.innerText = 'Error saving settings';
                msg.style.color = 'var(--danger)';
            }
        };

        async function loadMembers() {
            const listDiv = document.getElementById('membersList');
            const primaryList = document.getElementById('primaryGrandparentList');
            try {
                const res = await fetch('/api/family/members', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.status === 'successful') {
                    listDiv.innerHTML = data.members.map(m => `
                        <div class="list-item">
                            <div class="member-avatar" style="width: 40px; height: 40px; font-size: 1rem; margin: 0;">
                                ${m.username[0].toUpperCase()}
                            </div>
                            <div style="flex: 1;">
                                <div style="font-weight: 600;">${m.username}</div>
                                <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: capitalize;">${m.role}</div>
                            </div>
                            ${m.is_primary_grandparent ? '<span class="badge badge-pending">Primary</span>' : ''}
                            ${m.is_admin ? '<span class="badge badge-success">Admin</span>' : ''}
                        </div>
                    `).join('');

                    const grandparents = data.members.filter(m => m.role === 'grandparent');
                    if (grandparents.length === 0) {
                        primaryList.innerHTML = '<p style="color: var(--text-muted);">No grandparent available yet.</p>';
                    } else {
                        primaryList.innerHTML = grandparents.map(m => `
                            <div class="list-item" style="margin-bottom: 10px;">
                                <div style="flex: 1;">
                                    <div style="font-weight: 600;">${m.username}</div>
                                    <div style="font-size: 0.75rem; color: var(--text-muted);">
                                        ${m.is_primary_grandparent ? 'Current emergency source device' : 'Grandparent device'}
                                    </div>
                                </div>
                                <button
                                    class="btn-outline"
                                    style="padding: 8px 14px; ${m.is_primary_grandparent ? 'border-color: var(--purple); color: white; background: rgba(147, 51, 234, 0.2);' : ''}"
                                    onclick="setPrimaryGrandparent(${m.id})"
                                >
                                    ${m.is_primary_grandparent ? 'Selected' : 'Set Primary'}
                                </button>
                            </div>
                        `).join('');
                    }

                    updateFallSetupNotice({
                        primary_grandparent_id: data.members.find(m => m.is_primary_grandparent)?.id || null
                    }, data.members);
                }
            } catch (e) { console.error(e); }
        }

        async function setPrimaryGrandparent(memberId) {
            const msg = document.getElementById('primaryGrandparentMessage');
            msg.style.display = 'block';
            msg.style.color = 'var(--text-muted)';
            msg.innerText = 'Saving...';

            const res = await fetch('/api/family/primary-grandparent', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ member_id: memberId })
            });
            const result = await res.json();
            msg.innerText = result.message;
            msg.style.color = result.status === 'successful' ? 'var(--success)' : 'var(--danger)';
            if (result.status === 'successful') {
                loadMembers();
            }
        }

        document.getElementById('inviteForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('inviteUsername').value;
            const msg = document.getElementById('inviteMessage');
            
            msg.style.display = 'block';
            msg.style.color = 'var(--text-muted)';
            msg.innerText = 'Sending...';

            const res = await fetch('/api/family/invite', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ username })
            });
            const result = await res.json();
            
            msg.innerText = result.message;
            msg.style.color = result.status === 'successful' ? 'var(--success)' : 'var(--danger)';
            if (result.status === 'successful') {
                document.getElementById('inviteUsername').value = '';
                setTimeout(() => { msg.style.display = 'none'; }, 3000);
            }
        };

        if (token) {
            loadMembers();
            loadSettings();
        }
    </script>
</body>
</html>
