<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notifications - MobileCall</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <style>
        .invite-card {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 20px;
            text-align: left;
        }
        .actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .btn-sm {
            padding: 8px 16px;
            font-size: 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-accept { background: var(--success); color: white; }
        .btn-decline { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-accept:hover { background: #0ea271; transform: translateY(-1px); }
        .btn-decline:hover { background: rgba(239, 68, 68, 0.2); }
        .role-picker {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .role-chip {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.04);
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 600;
        }
        .role-chip.active {
            background: var(--purple);
            border-color: var(--purple-dark);
            color: white;
        }
    </style>
</head>
<body>
    <div class="box glass" style="max-width: 500px;">
        <h1>Inbox</h1>
        <p style="margin-bottom: 24px;">Manage your invitations and alerts.</p>

        <div id="notificationsList">
            <p style="padding: 40px; color: var(--text-muted);">Checking for notifications...</p>
        </div>

        <div style="margin-top: 30px;">
            <a href="/user/{{ logged_in_user }}" class="btn-outline">Back to Profile</a>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('auth_token');

        async function loadNotifications() {
            const listDiv = document.getElementById('notificationsList');
            try {
                const res = await fetch('/api/notifications', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.status === 'successful') {
                    if (data.notifications.length === 0) {
                        listDiv.innerHTML = '<p style="padding: 40px; color: var(--text-muted);">You have no pending invitations.</p>';
                        return;
                    }
                    listDiv.innerHTML = data.notifications.map(n => `
                        <div class="list-item invite-card">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                <div>
                                    <h4 style="margin-bottom: 4px;">Join "${n.family_name}"?</h4>
                                    <p style="font-size: 0.8rem;">Invited by <strong>${n.sender_name}</strong></p>
                                </div>
                                <span class="badge badge-pending">New</span>
                            </div>
                            <div>
                                <p style="font-size: 0.8rem; color: var(--text-muted); margin: 8px 0;">Choose your role in this family</p>
                                <div class="role-picker">
                                    <button class="role-chip active" data-invite="${n.id}" data-role="caregiver" onclick="selectRole(event, ${n.id}, 'caregiver')">Caregiver</button>
                                    <button class="role-chip" data-invite="${n.id}" data-role="grandparent" onclick="selectRole(event, ${n.id}, 'grandparent')">Grandparent</button>
                                </div>
                            </div>
                            <div class="actions">
                                <button class="btn-sm btn-accept" onclick="respond(${n.id}, 'accepted')">Accept</button>
                                <button class="btn-sm btn-decline" onclick="respond(${n.id}, 'rejected')">Decline</button>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (e) {
                listDiv.innerHTML = '<p style="color: var(--danger);">Failed to load notifications.</p>';
            }
        }

        const selectedRoles = {};

        function selectRole(event, inviteId, role) {
            event.preventDefault();
            selectedRoles[inviteId] = role;
            document.querySelectorAll(`[data-invite="${inviteId}"]`).forEach((button) => {
                button.classList.toggle('active', button.dataset.role === role);
            });
        }

        async function respond(inviteId, response) {
            const res = await fetch('/api/notifications/respond', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    invite_id: inviteId,
                    response,
                    role: selectedRoles[inviteId] || 'caregiver'
                })
            });
            const result = await res.json();
            if (result.status === 'successful') {
                loadNotifications();
            }
        }

        if (token) loadNotifications();
    </script>
</body>
</html>
