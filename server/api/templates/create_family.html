<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Family - MobileCall</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>
    <div class="box glass">
        <div class="avatar">F</div>
        <h1>New Family</h1>
        <p style="margin-bottom: 30px;">Give your group a name to get started.</p>
        
        <form id="createFamilyForm">
            <div class="form-group">
                <label for="familyName">Family Name</label>
                <input type="text" id="familyName" class="inputField" placeholder="e.g. The Smith Family" required>
            </div>
            <div class="form-group">
                <label for="adminRole">Your Role in this Family</label>
                <select id="adminRole" class="inputField" style="appearance: none;">
                    <option value="caregiver">Caregiver</option>
                    <option value="grandparent">Grandparent</option>
                </select>
            </div>
            <div id="roleHint" class="setup-notice" style="margin-bottom: 20px; padding: 14px 16px; background: rgba(99, 102, 241, 0.08); border-color: rgba(99, 102, 241, 0.22);">
                <div style="font-weight: 600; margin-bottom: 4px;">Family setup</div>
                <p id="roleHintText">If you create this family as a grandparent, this device can be assigned as the primary fall-monitoring source immediately.</p>
            </div>
            <button type="submit" class="submitButton">Create Family</button>
        </form>
        
        <div style="margin-top: 24px;">
            <a href="/user/{{ logged_in_user }}" class="btn-outline">Cancel</a>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('auth_token');
        const adminRole = document.getElementById('adminRole');
        const roleHintText = document.getElementById('roleHintText');

        function updateRoleHint() {
            if (adminRole.value === 'grandparent') {
                roleHintText.innerText = 'If you create this family as a grandparent, this device can be assigned as the primary fall-monitoring source immediately.';
                return;
            }
            roleHintText.innerText = 'If you create this family as a caregiver, fall monitoring will stay paused until a grandparent joins the family and is selected as primary.';
        }

        adminRole.addEventListener('change', updateRoleHint);
        updateRoleHint();

        document.getElementById('createFamilyForm').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('familyName').value;
            const role = adminRole.value;
            const res = await fetch('/api/family/create', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ name, role })
            });
            const result = await res.json();
            if (result.status === 'successful') {
                window.location.href = '/family/settings';
            } else {
                alert(result.message);
            }
        };
    </script>
</body>
</html>
