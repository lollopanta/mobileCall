<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ status_code }} - {{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>
    <div class="box glass" style="max-width: 560px; text-align: left;">
        <div class="badge badge-danger" style="display: inline-flex; margin-bottom: 18px;">Error {{ status_code }}</div>
        <h1 style="font-size: 2.2rem; margin-bottom: 10px;">{{ title }}</h1>
        <p style="margin-bottom: 28px;">{{ message }}</p>

        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
            <a href="/" class="btn-outline" style="flex: 1; min-width: 180px; text-align: center;">Go Home</a>
            {% if logged_in_user %}
            <a href="/user/{{ logged_in_user }}" class="btn-outline" style="flex: 1; min-width: 180px; text-align: center;">Back to Profile</a>
            {% else %}
            <a href="/login" class="btn-outline" style="flex: 1; min-width: 180px; text-align: center;">Sign In</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
